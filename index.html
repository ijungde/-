<!DOCTYPE html>
<html lang="ko"><head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
              return;
            }
            // Catch CDN load failures (htmlToImage undefined) and toPng errors
            // so the parent always gets a response instead of hanging forever.
            try {
              const screenshot = await htmlToImage.toPng(rootElement, {
                imagePlaceholder:
                  "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
              });
              window.parent.postMessage({
                type: 'screenshotData',
                data: screenshot,
              }, '*');
            } catch (err) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: err instanceof Error ? err : new Error(String(err)),
              }, '*');
            }
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 학습 레포트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EF;--w:#FFF;--bd:#E8E4DC;
  --dk:#18182A;--md:#5C5A72;--lt:#A8A5B8;
  --or:#E8650A;--am:#D4971A;--bl:#2E62B8;--gr:#2A8C5A;--rd:#C24810;
  --bgo:#FFF1E8;--bga:#FFF8E6;--bgb:#EAF0FC;--bgg:#E8F5EE;--bgr:#FFF1EC;
  --r:16px;--sh:0 2px 12px rgba(24,20,42,.07);--sh2:0 6px 24px rgba(24,20,42,.11);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--dk);min-height:100vh}
.page{max-width:1180px;margin:0 auto;padding:28px 22px 64px}

/* 클라우드 배너 */
.cbanner{background:var(--w);border:1.5px solid var(--bd);border-radius:14px;padding:16px 20px;margin-bottom:18px;box-shadow:var(--sh);transition:all .3s}
.cbanner.on{border-color:#B0DCC0;background:#F2FBF5}
.cbanner.err{border-color:#F0B0B0;background:#FDF2F2}
.cb-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cb-ttl{font-size:13px;font-weight:700;flex:1}
.cb-st{font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:20px;white-space:nowrap}
.cb-st.idle{color:var(--md);background:var(--bg);border:1px solid var(--bd)}
.cb-st.ok{color:#1E7A48;background:#E8F5EE;border:1px solid #B0DCC0}
.cb-st.err{color:#A02020;background:#FDF2F2;border:1px solid #F0B0B0}
.cb-st.ing{color:var(--am);background:#FFFAE6;border:1px solid #E8D08A}
.cb-row2{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.cb-inp{flex:1;min-width:200px;border:1.5px solid var(--bd);border-radius:10px;padding:8px 12px;font-size:12.5px;font-family:inherit;color:var(--dk);outline:none;background:var(--bg)}
.cb-inp:focus{border-color:var(--or);background:var(--w)}
.cb-inp::placeholder{color:var(--lt);font-size:12px}
.cbb{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--bd);background:var(--w);color:var(--md);font-family:inherit;transition:all .15s;white-space:nowrap}
.cbb:hover{background:var(--bg)}
.cbb:disabled{opacity:.4;cursor:not-allowed}
.cbb.primary{background:var(--or);color:#fff;border-color:var(--or)}
.cbb.primary:hover{background:#C85A08}
.cbb.sync{color:var(--bl);border-color:#B4C8F0}
.cbb.sync:hover{background:var(--bgb)}
.cbb.dis{color:#A02828;border-color:#E8B0B0}
.cbb.dis:hover{background:#FDF2F2}
.cb-info{font-size:11.5px;color:var(--md);margin-top:7px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--lt);flex-shrink:0;transition:background .3s}
.dot.ok{background:var(--gr)}.dot.ing{background:var(--am);animation:blink .7s infinite}.dot.err{background:var(--rd)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--w);border-radius:18px;padding:16px 24px;margin-bottom:18px;box-shadow:var(--sh);border:1px solid var(--bd);flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:12px}
.bico{width:40px;height:40px;border-radius:11px;background:var(--or);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bico svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2}
.bsub{font-size:10px;color:var(--or);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.bnm{font-size:17px;font-weight:800;color:var(--dk)}
.acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--w);color:var(--md);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--or);color:#fff;border-color:var(--or)}
.btn-p:hover{background:#C85A08}
.btn-u{background:var(--w);color:var(--bl);border-color:#B4C8F0}
.btn-u:hover{background:var(--bgb)}
.svbadge{display:none;align-items:center;gap:5px;font-size:11px;color:#1E7A48;background:#E8F5EE;border-radius:20px;padding:4px 11px;font-weight:700;border:1px solid #B0DCC0}
.svbadge.show{display:inline-flex}

.sp{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:18px;box-shadow:var(--sh);overflow:hidden}
.sp-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:14px 18px 12px}
.splbl{font-size:13px;font-weight:700;color:var(--dk);display:flex;align-items:center;gap:8px}
.cntb{font-size:11px;font-weight:700;color:var(--or);background:var(--bgo);border-radius:20px;padding:3px 10px}
.sptools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sinp{border:1.5px solid var(--bd);border-radius:10px;padding:7px 12px;font-size:12.5px;font-family:inherit;background:var(--bg);color:var(--dk);outline:none;min-width:140px}
.sinp:focus{border-color:var(--or);background:var(--w)}
.sinp::placeholder{color:var(--lt)}
.addb{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:24px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px dashed var(--am);background:transparent;color:#8A6010;font-family:inherit;transition:all .15s}
.addb:hover{background:var(--bga)}
.chobar{display:flex;align-items:center;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;background:#FAFAF8}
.chobar::-webkit-scrollbar{display:none}
.ct{padding:8px 12px;font-size:12px;font-weight:600;color:var(--lt);cursor:pointer;white-space:nowrap;border-right:1px solid var(--bd);transition:all .15s;flex-shrink:0;user-select:none}
.ct:hover{color:var(--md);background:var(--bg)}
.ct.act{color:var(--or);background:var(--w);font-weight:700;border-bottom:2px solid var(--or);margin-bottom:-1px}
.ct.has{color:var(--dk)}
.sgwrap{padding:12px 16px 14px;min-height:56px}
.sg{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:22px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--bd);background:var(--w);color:var(--md);white-space:nowrap;user-select:none;transition:all .15s}
.chip:hover{background:var(--bg)}
.chip.act{background:var(--or);color:#fff;border-color:var(--or);font-weight:700}
.chip .xb{width:15px;height:15px;border-radius:50%;background:rgba(100,60,20,.15);display:none;align-items:center;justify-content:center;font-size:10px;cursor:pointer;flex-shrink:0}
.chip:hover .xb{display:inline-flex}
.chip.act .xb{background:rgba(255,255,255,.3)}
.sempty{font-size:12.5px;color:var(--lt);padding:8px 4px}
.meta{display:flex;align-items:center;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.meta label{font-size:12.5px;color:var(--md);font-weight:600}
.meta input[type=month]{border:1.5px solid var(--bd);border-radius:10px;padding:7px 12px;font-size:12.5px;font-family:inherit;background:var(--w);color:var(--dk);outline:none;box-shadow:var(--sh)}
.meta input[type=month]:focus{border-color:var(--or)}
.subgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.subc{background:var(--w);border-radius:20px;border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .2s}
.subc:hover{box-shadow:var(--sh2)}
.chd{padding:14px 18px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--bd)}
.chl{display:flex;align-items:center;gap:10px}
.sbadge{padding:5px 15px;border-radius:22px;font-size:12px;font-weight:700;background:var(--or);color:#fff}
.ta{display:flex;align-items:center;gap:4px}
.tl{font-size:11.5px;color:var(--lt);font-weight:500;white-space:nowrap}
.ti{border:none;background:transparent;font-size:12px;font-weight:600;color:var(--md);font-family:inherit;outline:none;width:110px}
.ti::placeholder{color:#ccc;font-weight:400}
.ti:focus{color:var(--dk)}
.cib{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--w);color:var(--md);font-family:inherit;transition:all .15s;flex-shrink:0}
.cib:hover{background:var(--bg)}
.cib svg{width:11px;height:11px}
.cbody{padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sb{border-radius:14px;padding:14px 16px;overflow:hidden}
.so{background:var(--bgo)}.sa{background:var(--bga)}.sbl{background:var(--bgb)}.sg2{background:var(--bgg)}.sr{background:var(--bgr)}
.sh2{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sej{font-size:17px;line-height:1;flex-shrink:0}
.stt{font-size:13px;font-weight:700}
.so .stt{color:var(--or)}.sa .stt{color:var(--am)}.sbl .stt{color:var(--bl)}.sg2 .stt{color:var(--gr)}.sr .stt{color:var(--rd)}
.sdiv{height:1px;margin-bottom:9px;border-radius:2px;opacity:.18}
.so .sdiv{background:var(--or)}.sa .sdiv{background:var(--am)}.sbl .sdiv{background:var(--bl)}.sg2 .sdiv{background:var(--gr)}.sr .sdiv{background:var(--rd)}
.fi{width:100%;background:transparent;border:none;font-size:12.5px;color:var(--dk);font-family:inherit;resize:none;outline:none;line-height:1.7;padding:0;overflow:hidden}
.fi::placeholder{color:#C8C4B8}
.fi.ml{min-height:52px}
.star-row{display:flex;gap:5px;margin-top:6px}
.star{font-size:22px;cursor:pointer;transition:transform .12s;user-select:none;color:#DDD8CC;line-height:1}
.star:hover{transform:scale(1.2)}
.sa .star.on{color:var(--am)}
.estt{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--lt)}
.estt svg{width:46px;height:46px;margin-bottom:14px;opacity:.45}
.estt p{font-size:15px;font-weight:600}
.estt small{font-size:12.5px;margin-top:6px;display:block}
.memosec{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:18px 22px;margin-top:28px;box-shadow:var(--sh)}
.memohd{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.memoico{font-size:18px}
.memottl{font-size:14px;font-weight:700;color:var(--dk)}
.memobadge{font-size:11px;font-weight:600;color:var(--md);background:var(--bg);border-radius:20px;padding:3px 10px;border:1px solid var(--bd)}
.memohint{font-size:11px;color:var(--lt)}
.memolines{display:flex;flex-direction:column;gap:6px}
.memoline{display:flex;align-items:center;gap:8px}
.memonum{font-size:11px;color:var(--lt);font-weight:600;min-width:18px;flex-shrink:0}
.memoinp{flex:1;border:none;border-bottom:1px solid var(--bd);background:transparent;font-size:13px;color:var(--dk);font-family:inherit;outline:none;padding:5px 4px;transition:border-color .15s}
.memoinp:focus{border-bottom-color:var(--or)}
.memoinp::placeholder{color:#C8C4B8}
.bottom{display:flex;justify-content:center;gap:12px;margin-top:28px;padding-top:22px;border-top:1.5px dashed var(--bd)}
.bottom .btn{padding:12px 26px;font-size:13.5px}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#18182A;color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;z-index:9999;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media print{.cbanner,.topbar .acts,.sp,.meta,.bottom,.memosec{display:none!important}body{background:#fff}.page{padding:16px}.subgrid{grid-template-columns:1fr 1fr}.subc{break-inside:avoid;box-shadow:none}}

<script id="embedded-data" type="application/json">{"students":[],"values":{},"month":"2026-06","activeStudent":null}</script>
<script>
var SUBJECTS=[{key:'korean',label:'국어'},{key:'english',label:'영어'},{key:'math',label:'수학'},{key:'social',label:'사회'},{key:'science',label:'과학'}];
var SEC=[
  {key:'progress', label:'진도',            ej:'📖',cls:'so', color:'#E8650A',bg:'#FFF1E8',type:'text'},
  {key:'attitude', label:'수업태도',          ej:'🔥',cls:'sa', color:'#D4971A',bg:'#FFF8E6',type:'star'},
  {key:'goal',     label:'다음달 목표',        ej:'🎯',cls:'sbl',color:'#2E62B8',bg:'#EAF0FC',type:'textarea'},
  {key:'memo',     label:'수업 메모',          ej:'📝',cls:'sg2',color:'#2A8C5A',bg:'#E8F5EE',type:'textarea'},
  {key:'comment',  label:'담당 선생님의 한마디', ej:'💬',cls:'sr', color:'#C24810',bg:'#FFF1EC',type:'textarea',full:true}
];
var MEMO_N=10,LS_KEY='rpt_v12',GAS_LS='gas_url_v3';
var CHO_LIST=['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','기타'];
var CHO_RAW=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
var CHO_GRP={'ㄱ':['ㄱ','ㄲ'],'ㄴ':['ㄴ'],'ㄷ':['ㄷ','ㄸ'],'ㄹ':['ㄹ'],'ㅁ':['ㅁ'],'ㅂ':['ㅂ','ㅃ'],'ㅅ':['ㅅ','ㅆ'],'ㅇ':['ㅇ'],'ㅈ':['ㅈ','ㅉ'],'ㅊ':['ㅊ'],'ㅋ':['ㅋ'],'ㅌ':['ㅌ'],'ㅍ':['ㅍ'],'ㅎ':['ㅎ']};
function cho(n){if(!n||!n.trim())return'기타';var c=n.charCodeAt(0);if(c<0xAC00||c>0xD7A3)return'기타';var r=CHO_RAW[Math.floor((c-0xAC00)/28/21)];for(var g in CHO_GRP)if(CHO_GRP[g].indexOf(r)!==-1)return g;return'기타';}

var S={month:'',students:[],activeStudent:null,values:{}};
var undoStack=[],_es=null,srch='',actCho='전체',gasUrl='';

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fk(sid,sub,sec){return sid+'_'+S.month+'_'+sub+'_'+sec;}
function tk(sid,sub){return 't_'+sid+'_'+sub;}
function mk(i){return 'memo__'+S.month+'__'+i;}
function gv(k){return S.values[k]==null?'':S.values[k];}
function sv2(k,v){S.values[k]=v;}
function persist(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}}
function loadLS(){try{var d=localStorage.getItem(LS_KEY);return d?JSON.parse(d):null;}catch(e){return null;}}
var _at;
function autosave(){clearTimeout(_at);_at=setTimeout(function(){persist();showSaved();if(gasUrl)cloudSave();},900);}
function showSaved(){var b=document.getElementById('svbadge');b.classList.add('show');clearTimeout(b._t);b._t=setTimeout(function(){b.classList.remove('show');},2000);}

function beginEdit(){if(!_es)_es={snap:JSON.parse(JSON.stringify(S.values))};}
function commitEdit(){if(!_es)return;if(JSON.stringify(S.values)!==JSON.stringify(_es.snap)){undoStack.push(_es);if(undoStack.length>50)undoStack.shift();}_es=null;updU();}
function pushU(d){undoStack.push({desc:d,snap:JSON.parse(JSON.stringify(S.values))});if(undoStack.length>50)undoStack.shift();_es=null;updU();}
function updU(){document.getElementById('undoBtn').disabled=!undoStack.length;}
function undoAct(){if(!undoStack.length)return;_es=null;S.values=undoStack.pop().snap;persist();renderR();renderMemo();updU();}

/* ── CLOUD (JSONP) ── */
var _ci=0;
function jsonpLoad(url,cb){
  var nm='_jcb'+(++_ci);
  window[nm]=function(d){cb(null,d);delete window[nm];var s=document.getElementById(nm);if(s)s.parentNode.removeChild(s);};
  var sc=document.createElement('script');sc.id=nm;
  sc.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+nm+'&_='+Date.now();
  sc.onerror=function(){cb(new Error('실패'));delete window[nm];};
  document.head.appendChild(sc);
  setTimeout(function(){if(window[nm]){cb(new Error('타임아웃'));delete window[nm];}},12000);
}
function cloudLoad(url,cb){jsonpLoad(url,function(e,d){if(e||!d||!d.ok){cb(false,null);}else{cb(true,d.data);}});}
function cloudSave(){
  if(!gasUrl)return;
  setSyn('ing','저장 중…');
  fetch(gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'save',payload:{students:S.students,values:S.values,month:S.month}})
  }).then(function(){setSyn('ok','저장됨 '+new Date().toLocaleTimeString());}).catch(function(){setSyn('err','저장 실패');});
}
function setSyn(s,m){var d=document.getElementById('syndot');d.className='dot'+(s==='ok'?' ok':s==='ing'?' ing':s==='err'?' err':'');document.getElementById('synmsg').textContent=m;}
function setCbSt(c,t){var e=document.getElementById('cbst');e.className='cb-st '+c;e.textContent=t;document.getElementById('cbanner').className='cbanner'+(c==='ok'?' on':c==='err'?' err':'');}
function onUrlTyped(){document.getElementById('btnConn').disabled=!document.getElementById('gasUrl').value.trim();}
function applyCloudData(data){
  if(!data||!data.__students__)return;
  S.students=data.__students__||[];
  S.month=data.__month__||S.month;
  Object.keys(data).forEach(function(k){if(k!=='__students__'&&k!=='__month__')S.values[k]=data[k];});
  S.students.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
  if(!S.activeStudent&&S.students.length)S.activeStudent=S.students[0].id;
  document.getElementById('monthInput').value=S.month;
  persist();renderSP();renderR();renderMemo();
}
function doConnect(){
  var url=document.getElementById('gasUrl').value.trim();if(!url)return;
  setCbSt('ing','연결 중…');setSyn('ing','연결 확인 중…');document.getElementById('btnConn').disabled=true;
  cloudLoad(url,function(ok,data){
    if(ok){
      gasUrl=url;try{localStorage.setItem(GAS_LS,url);}catch(e){}
      setCbSt('ok','✅ 연결됨');setSyn('ok','연결 완료!');
      document.getElementById('btnSync').disabled=false;
      document.getElementById('btnDisc').style.display='';
      document.getElementById('btnConn').style.display='none';
      applyCloudData(data);showToast('☁️ 연결 완료! 데이터를 불러왔습니다.');
    }else{
      setCbSt('err','❌ 연결 실패');setSyn('err','연결 실패 — URL 확인 후 다시 시도');
      document.getElementById('btnConn').disabled=false;
      showToast('❌ 연결 실패. Apps Script를 새로 배포했는지 확인해주세요.');
    }
  });
}
function doSync(){if(!gasUrl)return;setSyn('ing','동기화 중…');cloudLoad(gasUrl,function(ok,data){if(ok&&data){applyCloudData(data);setSyn('ok','동기화 완료 '+new Date().toLocaleTimeString());showToast('🔄 동기화 완료!');}else{setSyn('err','동기화 실패');showToast('❌ 동기화 실패');}});}
function doDisconn(){if(!confirm('클라우드 연결을 해제합니다.'))return;gasUrl='';try{localStorage.removeItem(GAS_LS);}catch(e){}setCbSt('idle','미연결');setSyn('','URL을 입력하고 연결하기를 눌러주세요.');document.getElementById('btnSync').disabled=true;document.getElementById('btnDisc').style.display='none';document.getElementById('btnConn').style.display='';document.getElementById('btnConn').disabled=false;document.getElementById('gasUrl').value='';showToast('연결 해제됐습니다.');}

/* ── STUDENT ── */
function addStu(){var n=prompt('학생 이름을 입력하세요');if(!n||!n.trim())return;var id='s'+Date.now()+'_'+Math.floor(Math.random()*1000);S.students.push({id:id,name:n.trim()});S.students.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});S.activeStudent=id;actCho=cho(n.trim());srch='';document.getElementById('searchInput').value='';autosave();renderSP();renderR();renderMemo();}
function delStu(id){if(!confirm('학생을 삭제하시겠습니까?'))return;pushU('학생 삭제');S.students=S.students.filter(function(s){return s.id!==id;});Object.keys(S.values).forEach(function(k){if(k.indexOf(id+'_')===0||k.indexOf('t_'+id+'_')===0)delete S.values[k];});if(S.activeStudent===id)S.activeStudent=S.students.length?S.students[0].id:null;autosave();renderSP();renderR();renderMemo();}
function switchStu(id){S.activeStudent=id;renderSP();renderR();renderMemo();}
function doSearch(v){srch=v;actCho='전체';renderSP();}
function onMonth(){S.month=document.getElementById('monthInput').value;autosave();renderR();renderMemo();}

function renderSP(){
  document.getElementById('stuCount').textContent='총 '+S.students.length+'명';
  var gs={};S.students.forEach(function(s){gs[cho(s.name)]=true;});
  var bar=document.getElementById('choBar');bar.innerHTML='';
  ['전체'].concat(CHO_LIST).forEach(function(c){var sp=document.createElement('span');sp.className='ct'+(c===actCho?' act':'')+(gs[c]?' has':'');sp.textContent=c;sp.onclick=(function(cc){return function(){actCho=cc;srch='';document.getElementById('searchInput').value='';renderSP();};})(c);bar.appendChild(sp);});
  var list=S.students;
  if(srch.trim()){var q=srch.trim().toLowerCase();list=list.filter(function(s){return s.name.toLowerCase().indexOf(q)!==-1;});}
  else if(actCho!=='전체'){list=list.filter(function(s){return cho(s.name)===actCho;});}
  var grid=document.getElementById('stuGrid');grid.innerHTML='';
  if(!list.length){var em=document.createElement('span');em.className='sempty';em.textContent=S.students.length?'해당 초성의 학생이 없습니다.':'학생 추가 버튼으로 등록하세요.';grid.appendChild(em);return;}
  list.forEach(function(s){var c=document.createElement('div');c.className='chip'+(s.id===S.activeStudent?' act':'');c.innerHTML='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="width:12px;height:12px;flex-shrink:0"><circle cx="8" cy="5.5" r="2.5"/><path d="M2,14c0-3.3,2.7-6,6-6s6,2.7,6,6"/></svg><span>'+esc(s.name)+'</span><span class="xb" onclick="event.stopPropagation();delStu(\''+s.id+'\')">&times;</span>';c.onclick=function(){switchStu(s.id);};grid.appendChild(c);});
}

function renderMemo(){
  var stu=S.students.find(function(s){return s.id===S.activeStudent;});
  var sec=document.getElementById('memosec');if(!stu){sec.style.display='none';return;}
  sec.style.display='block';document.getElementById('memoBadge').textContent=S.month?S.month.replace('-','년 ')+'월':'';
  var cont=document.getElementById('memoLines');cont.innerHTML='';
  for(var i=0;i<MEMO_N;i++){var row=document.createElement('div');row.className='memoline';var num=document.createElement('span');num.className='memonum';num.textContent=(i+1)+'.';var inp=document.createElement('input');inp.className='memoinp';inp.type='text';inp.placeholder='메모 입력…';inp.maxLength=200;inp.value=gv(mk(i));(function(idx){inp.addEventListener('focusin',function(){beginEdit();});inp.addEventListener('focusout',function(){commitEdit();});inp.addEventListener('input',function(){sv2(mk(idx),this.value);autosave();});})(i);row.appendChild(num);row.appendChild(inp);cont.appendChild(row);}
}

function renderR(){
  var grid=document.getElementById('reportGrid');grid.innerHTML='';
  var stu=S.students.find(function(s){return s.id===S.activeStudent;});
  document.getElementById('stuTitle').textContent=stu?stu.name+' 월간 레포트':'월간 학습 레포트';
  if(!stu){grid.innerHTML='<div class="estt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg><p>학생을 추가하고 레포트를 작성해보세요</p><small>위 학생 목록에서 학생을 선택하거나 추가하세요</small></div>';return;}
  SUBJECTS.forEach(function(sub){
    var card=document.createElement('div');card.className='subc';var tv=gv(tk(stu.id,sub.key));
    function bs(s){var key=fk(stu.id,sub.key,s.key);var val=gv(key);var inner='';if(s.type==='star'){var at=gv(fk(stu.id,sub.key,'attitude_text'));var sv3=parseInt(gv(key)||0);var stars='';for(var i=1;i<=5;i++)stars+='<span class="star'+(i<=sv3?' on':'')+'" data-key="'+key+'" data-v="'+i+'">★</span>';inner='<textarea class="fi ml" data-key="'+fk(stu.id,sub.key,'attitude_text')+'" placeholder="수업태도 내용…">'+esc(at)+'</textarea><div class="star-row" data-sk="'+key+'">'+stars+'</div>';}else if(s.type==='text'){inner='<textarea class="fi" data-key="'+key+'" placeholder="입력하세요…" style="height:22px;" rows="1">'+esc(val)+'</textarea>';}else{inner='<textarea class="fi ml" data-key="'+key+'" placeholder="입력하세요…">'+esc(val)+'</textarea>';}return '<div class="sb '+s.cls+'"><div class="sh2"><span class="sej">'+s.ej+'</span><span class="stt">'+s.label+'</span></div><div class="sdiv"></div>'+inner+'</div>';}
    var body='<div class="cbody"><div class="srow">'+bs(SEC[0])+bs(SEC[1])+'</div><div class="srow">'+bs(SEC[2])+bs(SEC[3])+'</div>'+bs(SEC[4])+'</div>';
    card.innerHTML='<div class="chd"><div class="chl"><span class="sbadge">'+sub.label+'</span><div class="ta"><span class="tl">담당</span><input class="ti" data-tkey="'+tk(stu.id,sub.key)+'" placeholder="선생님 이름" value="'+esc(tv)+'"></div></div><button class="cib" onclick="copySubImg(\''+sub.key+'\',\''+sub.label+'\')" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>복사</button></div>'+body;
    grid.appendChild(card);
    card.addEventListener('focusin',function(e){if(e.target.dataset.key||e.target.dataset.tkey)beginEdit();});
    card.addEventListener('focusout',function(e){if(e.target.dataset.key||e.target.dataset.tkey)commitEdit();});
    card.addEventListener('input',function(e){var t=e.target;if(t.dataset.tkey){sv2(t.dataset.tkey,t.value);autosave();return;}if(t.dataset.key){sv2(t.dataset.key,t.value);autosave();autoR(t);}});
    card.addEventListener('click',function(e){var star=e.target.closest('.star');if(!star)return;var key=star.dataset.key||star.closest('[data-sk]').dataset.sk;var v=parseInt(star.dataset.v);var cur=parseInt(gv(key)||0);var nv=cur===v?0:v;pushU('별점');sv2(key,nv);autosave();star.closest('.star-row').querySelectorAll('.star').forEach(function(x){parseInt(x.dataset.v)<=nv?x.classList.add('on'):x.classList.remove('on');});});
    card.querySelectorAll('textarea').forEach(function(t){setTimeout(function(){autoR(t);},0);});
  });
}
function autoR(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3500);}

/* ── IMAGE ENGINE ── */
var SC=2.5;
function pf(sz,b){return(b?'700 ':'400 ')+Math.round(sz*SC)+"px 'Noto Sans KR',sans-serif";}
function px(n){return Math.round(n*SC);}
function rr(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);if(r<0)r=0;c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function wrap(c,txt,mxW){var lines=[],raw=(txt||'').split('\n');raw.forEach(function(line){if(!line){lines.push('');return;}var cur='';Array.from(line).forEach(function(ch){if(c.measureText(cur+ch).width>mxW&&cur){lines.push(cur);cur=ch;}else cur+=ch;});lines.push(cur);});return lines;}
var IP=px(12),LH=px(18),TH=px(32);
function secH(c,sec,stu,sk,w){c.font=pf(12,false);if(sec.type==='star'){var t=gv(fk(stu.id,sk,'attitude_text'))||'';return TH+Math.max(1,wrap(c,t,w-IP*2).length)*LH+IP+px(30)+IP;}var v=gv(fk(stu.id,sk,sec.key))||'';return TH+Math.max(1,wrap(c,v,w-IP*2).length)*LH+IP*2;}
function calcCardH(c,sub,stu,cW){var pad=px(14),hH=px(54),sg=px(10),inner=cW-pad*2,half=Math.floor((inner-sg)/2);var h=SEC.map(function(s,i){return secH(c,s,stu,sub.key,i<4?half:inner);});return hH+pad+Math.max(h[0],h[1])+sg+Math.max(h[2],h[3])+sg+h[4]+pad;}
function drawSec(c,sec,stu,sk,sx,sy,sw,sh){rr(c,sx,sy,sw,sh,px(12));c.fillStyle=sec.bg;c.fill();c.font=px(15)+'px serif';c.textBaseline='middle';c.textAlign='left';c.fillText(sec.ej,sx+IP,sy+TH/2);c.font=pf(12.5,true);c.fillStyle=sec.color;c.fillText(sec.label,sx+IP+px(22),sy+TH/2);c.save();c.strokeStyle=sec.color;c.globalAlpha=.18;c.lineWidth=px(1);c.beginPath();c.moveTo(sx+IP,sy+TH);c.lineTo(sx+sw-IP,sy+TH);c.stroke();c.restore();var cy=sy+TH+IP;if(sec.type==='star'){var at=gv(fk(stu.id,sk,'attitude_text'))||'';c.font=pf(12,false);c.textBaseline='top';c.textAlign='left';var lns=wrap(c,at,sw-IP*2);if(!at.trim()){c.fillStyle='#C8C4B8';c.fillText('수업태도 내용…',sx+IP,cy);}else{lns.forEach(function(ln,li){c.fillStyle='#18182A';c.fillText(ln,sx+IP,cy+li*LH);});}cy+=Math.max(1,lns.length)*LH+IP;c.save();c.strokeStyle=sec.color;c.globalAlpha=.15;c.lineWidth=px(1);c.setLineDash([px(3),px(3)]);c.beginPath();c.moveTo(sx+IP,cy-IP/2);c.lineTo(sx+sw-IP,cy-IP/2);c.stroke();c.restore();var sv3=parseInt(gv(fk(stu.id,sk,sec.key))||0);var ss=px(18),sg2=px(6),tw=5*ss+4*sg2,stX=sx+(sw-tw)/2;for(var i=1;i<=5;i++){c.font=px(17)+'px serif';c.textAlign='center';c.textBaseline='middle';c.fillStyle=i<=sv3?sec.color:'#DDD8CC';c.fillText('★',stX+(i-1)*(ss+sg2)+ss/2,cy+ss/2);}}else{var val=gv(fk(stu.id,sk,sec.key))||'';c.font=pf(12,false);c.textBaseline='top';c.textAlign='left';var lns2=wrap(c,val,sw-IP*2);if(!val.trim()){c.fillStyle='#C8C4B8';c.fillText('입력하세요…',sx+IP,cy);}else{lns2.forEach(function(ln,li){c.fillStyle='#18182A';c.fillText(ln,sx+IP,cy+li*LH);});}}}
function drawFC(c,sub,stu,x,y,cW){var pad=px(14),hH=px(54),sg=px(10),cr=px(16),inner=cW-pad*2,half=Math.floor((inner-sg)/2);var mc=document.createElement('canvas');mc.width=cW;mc.height=10;var mx=mc.getContext('2d');var h=SEC.map(function(s,i){return secH(mx,s,stu,sub.key,i<4?half:inner);});var r1=Math.max(h[0],h[1]),r2=Math.max(h[2],h[3]),cH=hH+pad+r1+sg+r2+sg+h[4]+pad;c.save();c.shadowColor='rgba(24,20,42,.08)';c.shadowBlur=px(8);c.shadowOffsetY=px(3);rr(c,x,y,cW,cH,cr);c.fillStyle='#fff';c.fill();c.restore();rr(c,x,y,cW,cH,cr);c.strokeStyle='#E8E4DC';c.lineWidth=px(1);c.stroke();rr(c,x,y,cW,hH,cr);c.fillStyle='#FAFAF8';c.fill();c.fillStyle='#E8E4DC';c.fillRect(x,y+hH-1,cW,px(1));c.font=pf(12,true);var bw=c.measureText(sub.label).width+px(24),bh=px(26);rr(c,x+pad,y+px(14),bw,bh,px(13));c.fillStyle='#E8650A';c.fill();c.fillStyle='#fff';c.textAlign='center';c.textBaseline='middle';c.fillText(sub.label,x+pad+bw/2,y+px(14)+bh/2);var tv=gv(tk(stu.id,sub.key));if(tv){c.font=pf(11.5,false);c.fillStyle='#A8A5B8';c.textAlign='left';c.textBaseline='middle';c.fillText('담당 '+tv+' 선생님',x+pad+bw+px(10),y+hH/2);}var cy=y+hH+pad;drawSec(c,SEC[0],stu,sub.key,x+pad,cy,half,r1);drawSec(c,SEC[1],stu,sub.key,x+pad+half+sg,cy,half,r1);cy+=r1+sg;drawSec(c,SEC[2],stu,sub.key,x+pad,cy,half,r2);drawSec(c,SEC[3],stu,sub.key,x+pad+half+sg,cy,half,r2);cy+=r2+sg;drawSec(c,SEC[4],stu,sub.key,x+pad,cy,inner,h[4]);return cH;}
function hasCont(stu,sk){return['progress','attitude','attitude_text','goal','memo','comment'].some(function(k){var v=gv(fk(stu.id,sk,k));return v&&String(v).trim();});}
var TH2=px(30),TW2=px(50);
function drawTile(c,sub,x,y){var cr=px(8);c.save();c.shadowColor='rgba(24,20,42,.07)';c.shadowBlur=px(4);c.shadowOffsetY=px(2);rr(c,x,y,TW2,TH2,cr);c.fillStyle='#fff';c.fill();c.restore();rr(c,x,y,TW2,TH2,cr);c.strokeStyle='#E8E4DC';c.lineWidth=px(1);c.stroke();rr(c,x,y,px(3),TH2,cr);c.fillStyle='#E8650A';c.fill();c.font=pf(10,true);c.fillStyle='#18182A';c.textAlign='center';c.textBaseline='middle';c.fillText(sub.label,x+TW2/2+px(2),y+TH2/2);}
function drawLogo(c,lx,ly,tw){c.save();c.strokeStyle='#DEDAD2';c.lineWidth=px(1);c.beginPath();c.moveTo(lx,ly);c.lineTo(lx+tw,ly);c.stroke();c.restore();var cy=ly+px(24),cx=lx+tw/2;c.font=pf(16,true);c.fillStyle='#C24810';c.textAlign='center';c.textBaseline='middle';c.fillText('wawa',cx-px(82),cy);c.font=pf(15,false);c.fillStyle='#C0BDB5';c.fillText('|',cx-px(36),cy);c.font=pf(16,true);c.fillStyle='#1A4FAA';c.fillText('W',cx-px(14),cy);c.font=pf(11,true);c.textBaseline='top';c.fillText('+',cx-px(1),cy-px(10));c.font=pf(15,false);c.fillStyle='#C0BDB5';c.textBaseline='middle';c.fillText('|',cx+px(18),cy);c.font=pf(16,true);c.fillStyle='#1E7A48';c.fillText('글로리드',cx+px(68),cy);}
function drawHdr(c,stu,ml,hx,hy,tw){rr(c,hx,hy,px(44),px(44),px(11));c.fillStyle='#E8650A';c.fill();c.font=px(20)+'px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('📋',hx+px(22),hy+px(22));c.font=pf(23,true);c.fillStyle='#18182A';c.textAlign='left';c.textBaseline='top';c.fillText(stu.name,hx+px(54),hy+px(2));c.font=pf(12,false);c.fillStyle='#A8A5B8';c.fillText('월간 학습 레포트 · '+ml,hx+px(54),hy+px(28));c.font=pf(14,true);c.fillStyle='#E8650A';c.textAlign='right';c.textBaseline='middle';c.fillText(ml,hx+tw,hy+px(22));c.strokeStyle='#F0EDE6';c.lineWidth=px(1);c.beginPath();c.moveTo(hx,hy+px(54));c.lineTo(hx+tw,hy+px(54));c.stroke();}
function cropC(s,h){if(h>=s.height)return s;var c2=document.createElement('canvas');c2.width=s.width;c2.height=h;c2.getContext('2d').drawImage(s,0,0);return c2;}

function buildCanvas(stu){
  var ml=(S.month||'미지정').replace('-','년 ')+'월';
  var oP=px(28),gap=px(14),tgap=px(6),hH=px(74),lgH=px(52),baseW=px(1000);
  var cW=Math.floor((baseW-oP*2-gap)/2);
  var full=[],empty=[];SUBJECTS.forEach(function(s){(hasCont(stu,s.key)?full:empty).push(s);});
  function mkM(){var c=document.createElement('canvas');c.width=10;c.height=10;return c.getContext('2d');}
  var n=full.length,e=empty.length;
  if(n===0){var mTPR=Math.max(1,Math.floor((baseW-oP*2+tgap)/(TW2+tgap)));var tR=Math.ceil(e/mTPR);var tRH=(TH2+tgap)*tR-tgap;var cv=document.createElement('canvas');cv.width=baseW;cv.height=oP+hH+oP+tRH+oP+lgH;var c=cv.getContext('2d');c.fillStyle='#FFF';c.fillRect(0,0,cv.width,cv.height);drawHdr(c,stu,ml,oP,oP,baseW-oP*2);var ty=oP+hH+oP;for(var ti=0;ti<e;ti++)drawTile(c,empty[ti],oP+(ti%mTPR)*(TW2+tgap),ty+Math.floor(ti/mTPR)*(TH2+tgap));drawLogo(c,oP,ty+tRH+px(14),baseW-oP*2);return cropC(cv,ty+tRH+px(14)+lgH);}
  var mx=mkM();var fH=full.map(function(s){return calcCardH(mx,s,stu,cW);});
  var rows=[];for(var i=0;i<n;i+=2){var p=[];for(var j=0;j<2&&i+j<n;j++)p.push(full[i+j]);rows.push(p);}
  var rH=rows.map(function(p){var m=0;p.forEach(function(s){m=Math.max(m,fH[full.indexOf(s)]);});return m;});
  var cH2=rH.reduce(function(a,b){return a+b;},0)+(rH.length>1?gap*(rH.length-1):0);
  var emL=e===0?'none':n===1?'right_col':n===3?'right_of_last':'below';
  var cvW=baseW,rX=0;
  if(emL==='right_col'){
    // 1과목: 카드 너비 + 간격 + 타일 너비 딱 맞게
    cvW=oP+cW+tgap+TW2+oP;rX=oP+cW+tgap;
  } else if(emL==='right_of_last'){
    cvW=baseW+tgap+TW2;rX=baseW+tgap;
  }
  var eH=0;if(emL==='below'){var c2=Math.max(1,Math.floor((cvW-oP*2+tgap)/(TW2+tgap)));var tR2=Math.ceil(e/c2);eH=(TH2+tgap)*tR2-tgap+gap;}
  var totH=oP+hH+oP+cH2+eH+oP+lgH;
  var cv2=document.createElement('canvas');cv2.width=cvW;cv2.height=totH;
  var c3=cv2.getContext('2d');c3.fillStyle='#FFF';c3.fillRect(0,0,cvW,totH);
  drawHdr(c3,stu,ml,oP,oP,cvW-oP*2);
  var cy=oP+hH+oP;
  if(emL==='right_col'){drawFC(c3,full[0],stu,oP,cy,cW);for(var ti2=0;ti2<e;ti2++)drawTile(c3,empty[ti2],rX,cy+ti2*(TH2+tgap));}
  else if(emL==='right_of_last'){for(var ri=0;ri<rows.length;ri++){var p2=rows[ri];var isL=(ri===rows.length-1);for(var ci=0;ci<p2.length;ci++)drawFC(c3,p2[ci],stu,ci===0?oP:oP+cW+gap,cy,cW);if(isL&&e>0){var tX=oP+cW+gap;for(var ti3=0;ti3<e;ti3++)drawTile(c3,empty[ti3],tX,cy+ti3*(TH2+tgap));}cy+=rH[ri]+(ri<rows.length-1?gap:0);}}
  else{for(var ri2=0;ri2<rows.length;ri2++){var p3=rows[ri2];for(var ci2=0;ci2<p3.length;ci2++)drawFC(c3,p3[ci2],stu,ci2===0?oP:oP+cW+gap,cy,cW);cy+=rH[ri2]+(ri2<rows.length-1?gap:0);}if(e>0&&emL==='below'){cy+=gap;var c4=Math.max(1,Math.floor((cvW-oP*2+tgap)/(TW2+tgap)));for(var ti4=0;ti4<e;ti4++)drawTile(c3,empty[ti4],oP+(ti4%c4)*(TW2+tgap),cy+Math.floor(ti4/c4)*(TH2+tgap));var tR3=Math.ceil(e/c4);cy+=(TH2+tgap)*tR3-tgap;}}
  var lY;if(emL==='right_col'){var tb=oP+hH+oP+e*(TH2+tgap)-tgap;var cb3=oP+hH+oP+fH[0];lY=Math.max(tb,cb3)+px(14);}else{lY=cy+px(14);}
  drawLogo(c3,oP,lY,cvW-oP*2);
  return cropC(cv2,lY+px(48));
}

function copyToClip(canvas,label){
  canvas.toBlob(function(blob){
    if(!blob){showToast('❌ 이미지 생성 실패');return;}
    if(navigator.clipboard&&window.ClipboardItem){
      try{navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(function(){showToast('📋 '+label+' 복사 완료! 카톡에 붙여넣기 하세요.');}).catch(function(){showToast('⚠️ 클립보드 권한을 허용해주세요.');});}
      catch(e){showToast('⚠️ Chrome 브라우저를 사용해 주세요.');}
    }else{showToast('⚠️ Chrome 브라우저를 사용해 주세요.');}
  },'image/png');
}
function copyAll(){var stu=S.students.find(function(s){return s.id===S.activeStudent;});if(!stu){alert('학생을 먼저 선택해주세요.');return;}var btn=document.getElementById('imgBtn');btn.disabled=true;btn.textContent='생성 중…';setTimeout(function(){try{copyToClip(buildCanvas(stu),stu.name+' 레포트');}catch(err){alert('오류: '+err.message);}btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>이미지 복사';},50);}
function copySubImg(sk,sl){var stu=S.students.find(function(s){return s.id===S.activeStudent;});if(!stu){alert('학생을 먼저 선택해주세요.');return;}var sub=SUBJECTS.find(function(s){return s.key===sk;});if(!sub)return;setTimeout(function(){try{var ml=(S.month||'미지정').replace('-','년 ')+'월';var oP=px(28),hH=px(68),lgH=px(52);var cW=px(720)-oP*2;var mc=document.createElement('canvas');mc.width=cW;mc.height=10;var cH3=calcCardH(mc.getContext('2d'),sub,stu,cW);var tH=oP+hH+oP+cH3+px(14)+lgH+oP;var cv=document.createElement('canvas');cv.width=px(720);cv.height=tH;var c=cv.getContext('2d');c.fillStyle='#FFF';c.fillRect(0,0,px(720),tH);var hx=oP,hy=oP;rr(c,hx,hy,px(38),px(38),px(10));c.fillStyle='#E8650A';c.fill();c.font=px(18)+'px serif';c.textAlign='center';c.textBaseline='middle';c.fillText(SEC[0].ej,hx+px(19),hy+px(19));c.font=pf(20,true);c.fillStyle='#18182A';c.textAlign='left';c.textBaseline='top';c.fillText(stu.name+' 학생',hx+px(48),hy+px(2));c.font=pf(12,false);c.fillStyle='#A8A5B8';c.fillText('월간 성장 리포트 / '+sl,hx+px(48),hy+px(24));c.font=pf(13,true);c.fillStyle='#E8650A';c.textAlign='right';c.textBaseline='middle';c.fillText(ml,px(720)-oP,hy+px(20));c.strokeStyle='#F0EDE6';c.lineWidth=px(1);c.beginPath();c.moveTo(oP,hy+px(48));c.lineTo(px(720)-oP,hy+px(48));c.stroke();drawFC(c,sub,stu,oP,hy+hH+oP,cW);drawLogo(c,oP,hy+hH+oP+cH3+px(14),px(720)-oP*2);copyToClip(cv,sl);}catch(err){alert('오류: '+err.message);}},50);}

function saveHtml(){
  persist();
  document.getElementById('embedded-data').textContent=JSON.stringify(S).replace(/</g,'\\u003c');
  document.getElementById('stuGrid').innerHTML='';document.getElementById('reportGrid').innerHTML='';document.getElementById('memoLines').innerHTML='';
  var se=document.getElementById('searchInput'),sv4=se.value;se.value='';
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.download='index.html';
  a.href=url;document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},200);
  se.value=sv4;renderSP();renderR();renderMemo();
}

function norm(st){if(!st||typeof st!=='object')st={};if(!Array.isArray(st.students))st.students=[];if(!st.values||typeof st.values!=='object')st.values={};if(!st.month){var n=new Date();st.month=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}if(st.activeStudent&&!st.students.find(function(s){return s.id===st.activeStudent;}))st.activeStudent=null;if(!st.activeStudent&&st.students.length)st.activeStudent=st.students[0].id;return st;}

function init(){
  var emb=document.getElementById('embedded-data').textContent.trim();
  var loaded=null;if(emb){try{loaded=JSON.parse(emb);}catch(e){}}
  if(!loaded)loaded=loadLS();
  S=norm(loaded||{});
  document.getElementById('monthInput').value=S.month;
  renderSP();renderR();renderMemo();
  try{var saved=localStorage.getItem(GAS_LS);if(saved){document.getElementById('gasUrl').value=saved;document.getElementById('btnConn').disabled=false;doConnect();}}catch(e){}
}
document.addEventListener('DOMContentLoaded',init);
</script>
